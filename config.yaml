# Neural Recruiter Configuration
# This file contains all configurable parameters for the ranking engine.
# Modify these values to adapt the system for different roles, industries, or requirements.

# System Configuration
system:
  # Current date for experience calculations and timeline validation
  current_date: "2026-06-11"
  
  # Mode: "demo" for synthetic candidates, "submission" for official evaluation
  mode: "submission"
  
  # Enable/disable features
  enable_honeypot_detection: true
  enable_domain_penalties: true
  enable_consulting_penalties: true

# Scoring Weights (must sum to 1.0)
weights:
  career_quality: 0.20
  skills_depth: 0.22
  jd_semantic_fit: 0.15
  title_alignment: 0.15
  experience_range: 0.10
  behavioral_availability: 0.10
  location_fit: 0.04
  github_signal: 0.04

