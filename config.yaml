# Honeypot Detection Thresholds
honeypot:
  # Career duration vs stated experience tolerance (percentage)
  career_duration_tolerance: 0.35
  
  # Minimum career months to check timeline paradox
  minimum_career_months: 24
  
  # Number of expert skills with 0 months duration to trigger honeypot
  expert_zero_threshold: 3
  
  # Number of expert skills with low endorsements to trigger honeypot
  expert_skills_threshold: 8
  expert_endorsements_threshold: 5

# Experience Scoring (default ranges if not in JD)
experience:
  default_min_years: 6
  default_max_years: 8
  sweet_spot_bonus: 1.0
  adjacent_bonus: 0.85
  moderate_penalty: 0.65
  severe_penalty: 0.20

# Behavioral Scoring
behavioral:
  # Inactivity thresholds (days)
  inactive_severe: 365
  inactive_moderate: 180
  
  # Response rate threshold for multiplier
  response_rate_threshold: 0.05
  
  # Notice period scoring (days)
  notice_period_excellent: 15
  notice_period_good: 30
  notice_period_fair: 60
  
  # Multipliers
  inactive_severe_multiplier: 0.10
  inactive_moderate_multiplier: 0.30
  low_response_multiplier: 0.40

# GitHub Activity Scoring
github:
  no_github_score: 0.25
  excellent_threshold: 70
  good_threshold: 50
  fair_threshold: 30
  poor_threshold: 10

# Output Configuration
output:
  default_top_n: 100
  include_components: false
  save_cache: true
